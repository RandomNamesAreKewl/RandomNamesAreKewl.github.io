<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../oos.css">
    <link rel="stylesheet" href="./colors.css">
</head>
<body style="background-color: black; margin: auto; padding: auto;">
    <style>
        #text {
            overflow-y: auto;
            color: white;
            font-size: 1rem;
            font-family: sans-serif, monospace;
            margin: 0px;
            padding: 0px;
        }

        .term-input {
            background-color: black;
            width: calc(100% - 4px);
            height: 1rem;
            color: #999;
            font-size: 1rem;
            font-family: sans-serif, monospace;
            margin: auto;
            padding: auto;
            border: none;
            resize: none;
            overflow: hidden;
        }
    </style>
    <div id="text">
    </div>
    <script>
        var UUID = null;
        // Request windows UID
        window.parent.postMessage(JSON.stringify({
            origin: UUID,
            action: 'uuid'
        }), '*');

        // Listen for messages from the parent window
        window.addEventListener("message", e => {
            let data = JSON.parse(e.data);
            switch(data.action) {
            case 'r-uuid':
                UUID = data.uuid;
                log("Received UUID");
                MainCommandLoop();
                break;
            case 'return':
                log(data.value.toString(), "yellow");
                MainCommandLoop();
                break;
            }
        });

        function log(text, color = "white", newline = true) {
            let span = document.createElement('span');
            span.innerText = text;
            if(newline) {
                span.innerHTML += '<br>';
            }
            span.classList.add(color);
            document.getElementById("text").appendChild(span);
        }

        function RequestInput() {
            let inputbox = document.getElementById("text").appendChild(document.createElement('input'));
            inputbox.type = "text";
            inputbox.classList.add("term-input");
            inputbox.focus();
            return new Promise(resolve => {
                inputbox.addEventListener("keydown", e => {
                    if(e.key == "Enter") {
                        let command = inputbox.value;
                        log(command);
                        inputbox.remove();
                        resolve(command);
                    }
                });
            });
        }

        function MainCommandLoop() {
            RequestInput().then(command => {
                window.parent.postMessage(JSON.stringify({
                    origin: UUID,
                    action: 'execute',
                    command: command
                }), '*');
            });
        }
    </script>
</body>
</html>
